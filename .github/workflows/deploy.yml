name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci --legacy-peer-deps

      - name: Build
        run: |
          cd apps/web
          GITHUB_REPOSITORY=${{ github.repository }} npm run build

      - name: Check build output
        run: |
          cd apps/web
          ls -la build/
          if [ -d "build/client" ]; then
            echo "Client build found in build/client"
            ls -la build/client/
          elif [ -d "build" ]; then
            echo "Build output found in build/"
            ls -la build/
            find build -name "*.html" -o -name "*.js" -o -name "*.css" | head -10
          else
            echo "No build directory found"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/build/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4